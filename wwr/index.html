<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Experience thrilling white water rafting adventures with Jesse's Rafting Company.">
  <meta name="author" content="Jesse Chisom Nnadi">
  <title>Home | Jesse's Rafting Company</title>
  <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
  <header>
    <img src="images/logo.png" alt="Rafting site logo">
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="trips.html">Trips</a>
      <a href="contact.html">Contact Us</a>
    </nav>
  </header>

  <main>
    <!-- Hero -->
    <div class="hero">
      <img src="images/hero.jpg" alt="Rafting adventure on the river">
      <h1 class="hero-text">Experience the Thrill of Whitewater!</h1>
    </div>

    <!-- Newsletter -->
    <section class="newsletter">
      <h2>Join Our Adventure Newsletter</h2>
      <form>
        <label>Name <input type="text" name="name" required></label>
        <label>Email <input type="email" name="email" required></label>
        <button type="submit">Subscribe</button>
      </form>
    </section>

    <!-- Call to Action -->
    <section class="cta">
      <p>Ready for your next adventure?</p>
      <a href="trips.html" class="btn">Explore Our Trips</a>
    </section>

    <!-- Grid Layout -->
    <section class="grid">
      <div>
        <img src="images/rafting1.jpg" alt="Group rafting on the river">
        <p>Unforgettable group experiences on the river.</p>
      </div>
      <div>
        <img src="images/rafting2.jpg" alt="Rafting guide leading adventure">
        <p>Expert guides ensuring safety and fun.</p>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 Jesse's Rafting Company | Jesse Chisom Nnadi</p>
    <nav class="socialmedia">
      <a href="#"><img src="images/facebook.png" alt="Facebook"></a>
      <a href="#"><img src="images/twitter.png" alt="Twitter"></a>
      <a href="#"><img src="images/instagram.png" alt="Instagram"></a>
    </nav>
  </footer>
</body>
</html>
